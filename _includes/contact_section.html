{% assign contact = site.data.content.contact %}
<section class="section contact-section{% if include.standalone %} standalone{% endif %}" id="contact" aria-labelledby="contact-title">
  <div>
    <p class="section-kicker">{{ contact.kicker }}</p>
    {% if include.standalone %}
      <h1 id="contact-title">{{ contact.title }}</h1>
    {% else %}
      <h2 id="contact-title">{{ contact.title }}</h2>
    {% endif %}
    <p>{{ contact.body }}</p>
  </div>
  <div class="contact-card">
    <a class="contact-link" href="mailto:{{ contact.email }}">{{ contact.email }}</a>
    {% for link in contact.links %}
      <a class="contact-link" href="{{ link.url }}">{{ link.label }}</a>
    {% endfor %}
    <img src="{{ contact.qr_image | relative_url }}" alt="{{ contact.qr_alt }}">
  </div>
</section>
