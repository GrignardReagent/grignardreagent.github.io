---
layout: default
---

<main id="main" class="subpage">
  <section class="section subpage-title">
    <p class="section-kicker">{{ page.kicker | default: page.title }}</p>
    <h1>{{ page.hero_title }}</h1>
  </section>

  <section class="section archive-list" aria-label="Project archive">
    {% for project in site.data.projects %}
      <article>
        <div>
          <p class="project-meta">{{ project.meta }}</p>
          <h2>{{ project.name }}</h2>
          <p>{{ project.description }}</p>
        </div>
        <a href="{{ project.link }}">{{ project.cta | default: "Open repository" }}</a>
      </article>
    {% endfor %}
  </section>
</main>
